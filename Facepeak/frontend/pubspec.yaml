name: frontend
description: FacePeak frontend
publish_to: 'none'

version: 1.0.1+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2
  file_picker: ^8.0.0
  http: ^1.2.2
  shared_preferences: ^2.5.5

  # 🌐 CONNECTIVITY
  connectivity_plus: ^6.0.3

  # 🔐 SECURE STORAGE
  flutter_secure_storage: ^9.0.0

  # 🔑 UUID
  uuid: ^4.5.1

  # 🔥 ADS
  google_mobile_ads: ^5.0.0

  # 🔥 SHARE
  share_plus: ^10.0.0

  # 🔥 STORAGE
  path_provider: ^2.1.4

  # 🔥 SAVE TO GALLERY
  gal: ^2.3.0

  # 🔥 FONTS
  google_fonts: ^6.1.0

  # ================================
  # 🔥 CAMERA + AI
  # ================================

  camera: ^0.11.0+2
  google_mlkit_face_detection: ^0.13.2
  image: ^4.2.0

  # ================================
  # 🔥 FIREBASE
  # ================================

  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_messaging: ^15.1.3
  google_sign_in: ^6.2.1

  # ================================
  # 🔥 WEBSOCKET
  # ================================

  web_socket_channel: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

  # 🔥 ICONS
  flutter_launcher_icons: ^0.13.1

  # 🔥 SPLASH
  flutter_native_splash: ^2.4.1

# ================================
# 🔥 ASSETS
# ================================
flutter:
  uses-material-design: true

  assets:
    - assets/logo.png

# ================================
# 🔥 APP ICON CONFIG
# ================================
flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"

# ================================
# 🔥 SPLASH CONFIG
# ================================
flutter_native_splash:
  color: "#05070D"
  android: true
  ios: true

  android_12:
    color: "#05070D"
    icon_background_color: "#05070D"